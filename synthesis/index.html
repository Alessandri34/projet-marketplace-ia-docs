<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthèse - Marketplace IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary-blue: #2563eb;
            --accent-blue: #eff6ff;
            --border-color: #e2e8f0;
            --heading-color: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px;
        }

        .header {
            max-width: 1200px;
            margin: 0 auto 40px auto;
            text-align: center;
            animation: fadeInDown 0.5s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--heading-color);
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.6s ease-out backwards;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            border-color: #bfdbfe;
        }

        .card-header {
            margin-bottom: 16px;
        }

        .card-number {
            display: inline-block;
            background-color: var(--accent-blue);
            color: var(--primary-blue);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--heading-color);
            line-height: 1.3;
        }

        .card-summary {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-sections {
            margin-bottom: 24px;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }

        .card-sections-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .section-tag {
            display: inline-block;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #475569;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            margin: 4px 4px 0 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .card-action {
            margin-top: auto;
        }

        .btn {
            display: block;
            width: 100%;
            text-align: center;
            background-color: var(--primary-blue);
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-blue-hover);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top Navigation */
        .top-nav {
            position: absolute;
            top: 20px;
            left: 40px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--primary-blue);
        }
        .back-link svg {
            width: 16px; height: 16px;
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="../index.html" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Retour à la vue complète
        </a>
    </div>

    <div class="header">
        <h1>Executive Dashboard</h1>
        <p>Vue synthétique de l'ensemble des documents fondateurs de la Marketplace IA.</p>
    </div>

    <div class="dashboard" id="dashboard">
        <!-- Cards injected via JS -->
    </div>

    <!-- Data payload -->
    <script src="data.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dashboard = document.getElementById('dashboard');

            if (typeof markdownData !== 'undefined' && markdownData.length > 0) {
                markdownData.forEach((doc, index) => {
                    // Extract Title (H1)
                    const titleMatch = doc.content.match(/^#\s+(.*)/m);
                    let title = titleMatch ? titleMatch[1] : doc.name.replace('.md', '');
                    // Format prefix if exists (e.g. "01 — Vision")
                    title = title.replace(/^[0-9a-z]+\s*[-—]\s*/i, '');

                    // Extract File Number
                    const fileNumMatch = doc.name.match(/^([0-9a-z]+)-/i);
                    const fileNum = fileNumMatch ? `DOC ${fileNumMatch[1]}` : 'DOC';

                    // Extract Summary (first paragraph ignoring headers and markdown syntax)
                    const lines = doc.content.split('\n').map(l => l.trim());
                    let summaryText = "";
                    for(let line of lines) {
                        if (line && !line.startsWith('#') && !line.startsWith('---') && !line.startsWith('|')) {
                            // strip blockquote arrows and markdown bold/italic
                            let cleanLine = line.replace(/^>\s*/, '').replace(/\*\*/g, '').replace(/\*/g, '');
                            if (cleanLine.length > 20) {
                                summaryText += cleanLine + " ";
                                if (summaryText.length > 150) break;
                            }
                        }
                    }
                    if (summaryText.length > 140) summaryText = summaryText.substring(0, 140) + '...';

                    // Extract Sections (H2)
                    const sectionMatches = [...doc.content.matchAll(/^##\s+(.*)/gm)];
                    const sections = sectionMatches.map(m => {
                        let s = m[1].replace(/\*\*/g, '').replace(/<[^>]*>?/gm, ''); // clean formatting
                        return s.length > 35 ? s.substring(0, 35) + '...' : s;
                    }).slice(0, 4); // Keep only top 4 sections for the card

                    // Create Card HTML
                    let sectionsHtml = '';
                    if (sections.length > 0) {
                        sectionsHtml = `
                            <div class="card-sections">
                                <div class="card-sections-title">Points clés abordés</div>
                                <div>
                                    ${sections.map(s => `<span class="section-tag">${s}</span>`).join('')}
                                </div>
                            </div>
                        `;
                    }

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="card-number">${fileNum}</span>
                            <h2 class="card-title">${title}</h2>
                        </div>
                        <div class="card-summary">
                            ${summaryText || "Document technique ou structurel nécessitant une lecture détaillée."}
                        </div>
                        ${sectionsHtml}
                        <div class="card-action">
                            <a href="../index.html" class="btn" onclick="sessionStorage.setItem('openDoc', '${doc.name}')">Lire le document entier</a>
                        </div>
                    `;

                    dashboard.appendChild(card);
                });
            } else {
                dashboard.innerHTML = `<p>Aucune donnée trouvée. Veuillez vérifier data.js.</p>`;
            }
        });
    </script>
</body>
</html>
