<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Marketplace IA - Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            /* Premium Blue & White Palette */
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --sidebar-border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary-blue: #2563eb;
            --primary-blue-hover: #1d4ed8;
            --active-item-bg: #eff6ff;
            
            --heading-color: #0f172a;
            --code-bg: #1e293b;
            --blockquote-bg: #f1f5f9;
            --blockquote-border: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 16px;
            line-height: 1.5;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 320px;
            min-width: 320px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 24px rgba(0,0,0,0.02);
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--sidebar-border);
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--heading-color);
            margin-bottom: 4px;
            background: linear-gradient(90deg, var(--primary-blue), #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-header p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .nav-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding: 16px 0;
        }

        .nav-item {
            padding: 10px 24px;
            margin: 4px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
        }

        .nav-item:hover {
            background-color: #f1f5f9;
        }

        .nav-item.active {
            background-color: var(--active-item-bg);
            color: var(--primary-blue);
            font-weight: 600;
            position: relative;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            height: 60%;
            width: 4px;
            background-color: var(--primary-blue);
            border-radius: 0 4px 4px 0;
        }

        /* Document Icon */
        .doc-icon {
            margin-right: 12px;
            opacity: 0.6;
            width: 18px;
            height: 18px;
        }
        .nav-item.active .doc-icon {
            opacity: 1;
            color: var(--primary-blue);
        }

        /* Main Content Styling */
        #main-content {
            flex: 1;
            overflow-y: auto;
            padding: 48px;
            scroll-behavior: smooth;
        }

        .content-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 48px 64px;
            border-radius: 16px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.02);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown Prose Styling */
        .prose h1, .prose h2, .prose h3, .prose h4 {
            color: var(--heading-color);
            margin-top: 2em;
            margin-bottom: 0.75em;
            font-weight: 600;
        }
        .prose h1 { 
            font-size: 2.5rem; 
            margin-top: 0;
            letter-spacing: -0.02em;
            border-bottom: 2px solid #eff6ff;
            padding-bottom: 0.3em;
        }
        .prose h2 { font-size: 1.8rem; letter-spacing: -0.01em; }
        .prose h3 { font-size: 1.4rem; }
        .prose p { margin-bottom: 1.5em; line-height: 1.8; color: #334155; }
        .prose ul, .prose ol { margin-bottom: 1.5em; padding-left: 1.5em; line-height: 1.8; color: #334155;}
        .prose li { margin-bottom: 0.5em; }
        
        .prose strong { color: var(--heading-color); font-weight: 600; }
        
        .prose a { color: var(--primary-blue); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s;}
        .prose a:hover { border-color: var(--primary-blue); }
        
        .prose blockquote {
            background-color: var(--blockquote-bg);
            border-left: 4px solid var(--blockquote-border);
            padding: 16px 24px;
            margin: 2em 0;
            border-radius: 0 8px 8px 0;
            color: #475569;
            font-style: italic;
        }

        .prose code {
            background-color: #f1f5f9;
            color: #db2777;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.9em;
        }

        .prose pre {
            background-color: var(--code-bg);
            color: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.5em 0;
        }
        .prose pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
            border-radius: 0;
        }

        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin: 2em 0;
            font-size: 0.95rem;
        }
        .prose th {
            background-color: #f8fafc;
            color: var(--heading-color);
            font-weight: 600;
            text-align: left;
            padding: 12px 16px;
            border-bottom: 2px solid #e2e8f0;
        }
        .prose td {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            color: #475569;
        }
        .prose tr:hover td { background-color: #f8fafc; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
        }
        .empty-state svg {
            width: 64px; height: 64px;
            margin-bottom: 16px;
            color: #cbd5e1;
        }

    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h1>Marketplace IA</h1>
            <p>Documents de conception</p>
        </div>
        <ul class="nav-list" id="nav-list">
            <!-- Navigation items will be injected here -->
        </ul>
    </aside>

    <main id="main-content">
        <div class="content-wrapper" id="content-wrapper">
            <div class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <h2>Sélectionnez un document</h2>
                <p>Choisissez un fichier dans le menu de gauche pour commencer la lecture.</p>
            </div>
        </div>
    </main>

    <!-- Data payload generated dynamically -->
    <script src="data.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navList = document.getElementById('nav-list');
            const contentWrapper = document.getElementById('content-wrapper');

            // Formatter le nom du fichier pour l'affichage
            const formatFileName = (filename) => {
                let name = filename.replace('.md', '');
                // Remplacer les tirets par des espaces et mettre des majuscules
                return name.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            };

            // SVG icon for docs
            const docIconSVG = `<svg class="doc-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
            </svg>`;

            const renderContent = (docItem) => {
                // Re-trigger animation
                contentWrapper.style.animation = 'none';
                contentWrapper.offsetHeight; /* trigger reflow */
                contentWrapper.style.animation = 'fadeIn 0.4s ease-out';
                
                // Parse markdown
                const htmlContent = marked.parse(docItem.content);
                contentWrapper.innerHTML = `<div class="prose">${htmlContent}</div>`;
                
                // Scroll to top
                document.getElementById('main-content').scrollTop = 0;
            };

            const setActiveNav = (targetEl) => {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                targetEl.classList.add('active');
            };

            if (typeof markdownData !== 'undefined' && markdownData.length > 0) {
                markdownData.forEach((doc, index) => {
                    const li = document.createElement('li');
                    li.className = 'nav-item';
                    li.innerHTML = `${docIconSVG} <span>${formatFileName(doc.name)}</span>`;
                    
                    li.addEventListener('click', () => {
                        setActiveNav(li);
                        renderContent(doc);
                    });
                    
                    navList.appendChild(li);
                });
                
                // Select default item or requested item from synthesis
                let targetIndex = 0;
                const requestedDoc = sessionStorage.getItem('openDoc');
                if (requestedDoc) {
                    const foundIndex = markdownData.findIndex(d => d.name === requestedDoc);
                    if (foundIndex !== -1) {
                        targetIndex = foundIndex;
                    }
                    sessionStorage.removeItem('openDoc'); // clean up
                }

                const items = navList.querySelectorAll('.nav-item');
                if (items.length > targetIndex) {
                    setActiveNav(items[targetIndex]);
                    renderContent(markdownData[targetIndex]);
                    // Scroll sidebar to the active item
                    items[targetIndex].scrollIntoView({ block: 'center', behavior: 'smooth' });
                }
            } else {
                contentWrapper.innerHTML = `
                    <div class="empty-state">
                        <h2>Aucune donnée trouvée</h2>
                        <p>Vérifiez que data.js a été généré correctement.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
